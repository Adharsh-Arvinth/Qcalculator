<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A multi-mode scientific, graphing, programmer, date, and quantum computing calculator with 13 unit converters." />
  <title>Quantum Scientific Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Sidebar Overlay (click to close) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar Navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-close" id="sidebarClose" title="Close menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="sidebar-title">Calculator</span>
    </div>

    <div class="sidebar-scroll">
      <!-- Calculator Modes -->
      <div class="sidebar-group">
        <button class="sidebar-item active" data-mode="scientific" id="navScientific">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="12" y1="10" x2="14" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="12" y1="14" x2="14" y2="14"/><line x1="8" y1="18" x2="14" y2="18"/></svg>
          <span>Scientific</span>
        </button>
        <button class="sidebar-item" data-mode="graphing" id="navGraphing">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>Graphing</span>
        </button>
        <button class="sidebar-item" data-mode="programmer" id="navProgrammer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <span>Programmer</span>
        </button>
        <button class="sidebar-item" data-mode="date" id="navDate">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Date Calculation</span>
        </button>
        <button class="sidebar-item" data-mode="quantum" id="navQuantum">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="10" ry="4"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-60 12 12)"/></svg>
          <span>Quantum Computing</span>
          <span class="badge-new">NEW</span>
        </button>
      </div>

      <!-- Converter Modes -->
      <div class="sidebar-group">
        <div class="sidebar-group-label">Converter</div>
        <button class="sidebar-item" data-mode="converter-currency" id="navCurrency">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          <span>Currency</span>
        </button>
        <button class="sidebar-item" data-mode="converter-volume" id="navVolume">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2h8l2 18H6L8 2z"/><path d="M6 14h12"/></svg>
          <span>Volume</span>
        </button>
        <button class="sidebar-item" data-mode="converter-length" id="navLength">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12h20M6 8v8M12 6v12M18 8v8"/></svg>
          <span>Length</span>
        </button>
        <button class="sidebar-item" data-mode="converter-weight" id="navWeight">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3a4 4 0 014 4c0 2-2 3-2 6H10c0-3-2-4-2-6a4 4 0 014-4z"/><rect x="6" y="13" width="12" height="8" rx="1"/></svg>
          <span>Weight & Mass</span>
        </button>
        <button class="sidebar-item" data-mode="converter-temperature" id="navTemperature">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/></svg>
          <span>Temperature</span>
        </button>
        <button class="sidebar-item" data-mode="converter-energy" id="navEnergy">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span>Energy</span>
        </button>
        <button class="sidebar-item" data-mode="converter-area" id="navArea">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
          <span>Area</span>
        </button>
        <button class="sidebar-item" data-mode="converter-speed" id="navSpeed">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="14" r="8"/><path d="M12 14l3-6"/><path d="M8 6h8"/></svg>
          <span>Speed</span>
        </button>
        <button class="sidebar-item" data-mode="converter-time" id="navTime">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Time</span>
        </button>
        <button class="sidebar-item" data-mode="converter-power" id="navPower">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span>Power</span>
        </button>
        <button class="sidebar-item" data-mode="converter-data" id="navData">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 5v6c0 1.66-4.03 3-9 3s-9-1.34-9-3V5"/><path d="M21 11v6c0 1.66-4.03 3-9 3s-9-1.34-9-3v-6"/></svg>
          <span>Data</span>
        </button>
        <button class="sidebar-item" data-mode="converter-pressure" id="navPressure">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="14" r="8"/><path d="M12 10v4"/><path d="M12 6v1"/></svg>
          <span>Pressure</span>
        </button>
        <button class="sidebar-item" data-mode="converter-angle" id="navAngle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20h16M4 20l8-16M4 20l6-3"/><path d="M8 16a8 8 0 013-3"/></svg>
          <span>Angle</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main App -->
  <main class="app-container" id="appContainer">
    <!-- Top bar -->
    <header class="top-bar" id="topBar">
      <button class="hamburger-btn" id="hamburgerBtn" title="Open menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="top-bar-title" id="topBarTitle">Scientific</h1>
    </header>

    <!-- Mode container — dynamic content renders here -->
    <div class="mode-container" id="modeContainer"></div>
  </main>

  <!-- Scripts (order matters) -->
  <script src="js/app.js"></script>
  <script src="js/scientific.js"></script>
  <script src="js/graphing.js"></script>
  <script src="js/programmer.js"></script>
  <script src="js/date.js"></script>
  <script src="js/converter.js"></script>
  <script src="js/quantum.js"></script>
</body>
</html>
